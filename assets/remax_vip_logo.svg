    <!-- Text RE/MAX -->
    <text x="130" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="64" fill="#FFFFFF" letter-spacing="-2">RE</text>
    <text x="235" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="64" fill="#0054A4" letter-spacing="-2">/</text>
    <text x="255" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="64" fill="#FFFFFF" letter-spacing="-2">MAX</text>
    
    <!-- Text VIP -->
    <text x="270" y="105" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#E11B22" letter-spacing="4">VIP</text>
</svg>
